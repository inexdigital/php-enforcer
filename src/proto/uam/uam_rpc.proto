syntax = "proto3";

package app;

option go_package = ".;proto";

option php_namespace = "Inexdigital\\Enforcer\\Grpc\\Uam\\Api";
option php_metadata_namespace = "Inexdigital\\Enforcer\\Grpc\\Uam\\GPBMetadata";

service Api {
    rpc Enforce (EnforceRequest) returns (EnforceResponse) {}
    rpc EnforcerConfigRBAC(EnforcerConfigRequest) returns(EnforcerConfigResponse) {}
    rpc EnforcerConfigABAC(EnforcerConfigRequest) returns(EnforcerConfigResponse) {}
}


message EnforceRequest {
    string role = 1;
    string path = 2;
    string method = 3;
}

message EnforceResponse {}

message EnforcerConfigRequest {}

message PolicyList {
    repeated string policy = 1;
}

message EnforcerConfigResponse {
    string model = 1;
    repeated PolicyList policy_list = 2;
}